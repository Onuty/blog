# Decap CMS config for /admin
# Content is stored in this repository under src/content/blog.

backend:
  name: github
  repo: Onuty/blog
  branch: main
  # If you use a custom OAuth proxy, uncomment and configure:
  # base_url: https://your-oauth-proxy.example.com
  # auth_endpoint: auth

# Enable this when running Decap local backend tooling in development.
local_backend: true

site_url: https://onuty.net
display_url: https://onuty.net
logo_url: /images/blog-cover-1.svg

publish_mode: simple
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Blog
    label_singular: Post
    folder: src/content/blog
    create: true
    delete: true
    extension: mdx
    format: frontmatter
    # Uses the explicit slug field for filename + route (entry.slug).
    slug: "{{slug}}"
    preview_path: blog/{{slug}}
    editor:
      preview: false
    fields:
      -
        label: Title
        name: title
        widget: string
        required: true
      -
        label: Slug
        name: slug
        widget: string
        required: true
        hint: "Lowercase kebab-case, e.g. my-new-post"
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "Use lowercase kebab-case only (letters, numbers, hyphens)."
      -
        label: Date
        name: date
        widget: datetime
        required: true
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      -
        label: Tags
        name: tags
        widget: list
        required: false
        default: []
        hint: "Optional. Each item should be a simple tag string."
      -
        label: Description
        name: description
        widget: text
        required: true
      -
        label: Draft
        name: draft
        widget: boolean
        required: false
        default: false
      -
        label: Featured
        name: featured
        widget: boolean
        required: false
        default: false
      -
        label: Pinned
        name: pinned
        widget: boolean
        required: false
        default: false
      -
        label: Cover
        name: cover
        widget: image
        required: false
        hint: "Optional. Upload/select an image. This is saved to public/uploads and should resolve as /uploads/filename.ext"
      -
        label: Body
        name: body
        widget: markdown
