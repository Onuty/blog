<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onuty Admin</title>
    <base href="/admin/" />
    <script>
      // Keep /admin and /admin/ consistent so Decap resolves /admin/config.yml.
      if (window.location.pathname === "/admin") {
        window.location.replace("/admin/" + window.location.hash);
      }
    </script>
  </head>
  <body>
    <noscript>You need JavaScript enabled to use the Decap CMS admin panel.</noscript>
    <script src="https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js"></script>
  </body>
</html>
